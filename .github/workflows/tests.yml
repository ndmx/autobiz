name: tests

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests

      - name: Compile Python modules
        run: uv run python -m compileall app.py agent.py scraper.py listing_utils.py proximity.py reporting.py dashboard_data.py dedupe.py source_adapters tests
